<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensed.gg | Entrenamiento Cognitivo</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav" id="main-nav" style="display: none;">
        <a href="#" class="nav-logo" id="nav-logo">SENSED.GG</a>
        <div class="nav-modes">
            <button class="nav-btn active" data-mode="color">COLOR</button>
            <button class="nav-btn" data-mode="sound">SONIDO</button>
            <button class="nav-btn" data-mode="time">TIEMPO</button>
            <button class="nav-btn" data-mode="fishing">PESCA</button>
        </div>
        <div class="nav-score-display" id="nav-score">0 pts</div>
    </nav>

    <main>
        <section class="screen active" id="screen-auth">
            <div class="game-content">
                <h1 class="home-title" id="auth-title">Iniciar Sesión</h1>
                <input type="text" id="auth-username" placeholder="Usuario" class="btn-start" style="background: var(--bg3); color: white;">
                <input type="password" id="auth-password" placeholder="Contraseña" class="btn-start" style="background: var(--bg3); color: white;">
                <button class="btn-start" id="btn-auth-submit">ENTRAR</button>
                <p style="font-size: 0.9rem; margin-top: 1rem;"><span id="auth-toggle-text">¿No tienes cuenta?</span> <a href="#" id="btn-auth-toggle" style="color: var(--accent);">Regístrate</a></p>
            </div>
        </section>

        <section class="screen" id="screen-home">
            <div class="game-content">
                <span class="home-eyebrow">Bienvenido, Gonzalo</span>
                <h1 class="home-title">Entrena tus sentidos</h1>
                <p class="home-desc">Desarrolla tu agudeza visual, auditiva y de reflejos con retos diarios.</p>
                <button class="btn-start" id="btn-start">COMENZAR RETO COLOR</button>
            </div>
        </section>

        <section class="screen" id="screen-color-memorize">
            <div class="game-content">
                <div class="round-label">RONDA <span id="color-round-num">1</span>/5</div>
                <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
                <div class="color-display" id="color-display"></div>
                <p>Memoriza el color...</p>
            </div>
        </section>

        <section class="screen" id="screen-color-guess">
            <div class="game-content">
                <div class="round-label">RONDA <span id="color-guess-num">1</span>/5</div>
                <div class="color-display" id="color-preview-box"></div>
                <div class="slider-group">
                    <label>Tono (H): <span id="val-h">0</span></label>
                    <input type="range" id="slider-h" min="0" max="360" value="0">
                </div>
                <div class="slider-group">
                    <label>Saturación (S): <span id="val-s">50</span></label>
                    <input type="range" id="slider-s" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <label>Luz (L): <span id="val-l">50</span></label>
                    <input type="range" id="slider-l" min="0" max="100" value="50">
                </div>
                <button class="btn-start" id="btn-color-confirm">CONFIRMAR</button>
            </div>
        </section>

        </main>

    <div class="toast" id="toast"></div>

    <script src="game.js"></script>
</body>
</html>
