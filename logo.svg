<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="sensedYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EAFF00" />
      <stop offset="100%" stop-color="#D4E700" />
    </linearGradient>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="#1A1A1A" />
  
  <rect width="504" height="504" x="4" y="4" rx="116" fill="none" stroke="#2A2A2A" stroke-width="4" />

  <path d="M 365 175 
           C 365 115, 147 115, 147 190 
           C 147 290, 365 260, 365 340 
           C 365 405, 147 415, 147 345
           L 207 345
           C 207 375, 305 370, 305 340
           C 305 270, 87 295, 87 190
           C 87 110, 305 95, 305 175 Z" 
        fill="url(#sensedYellow)" 
        filter="url(#softGlow)" />
</svg>
